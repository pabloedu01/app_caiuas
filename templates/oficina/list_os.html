<!DOCTYPE html>
<html lang="pt-BR" dir="ltr" data-navigation-type="default" data-navbar-horizontal-shape="default">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ context.title if context and context.title else 'Lista de Ordens de Serviço' }}</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/img/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/img/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/img/favicons/favicon-16x16.png">
  <link rel="shortcut icon" type="image/x-icon" href="/static/assets/img/favicons/favicon.ico">
  <link rel="manifest" href="/static/assets/img/favicons/manifest.json">
  <meta name="msapplication-TileImage" content="static/assets/img/favicons/mstile-150x150.png">
  <meta name="theme-color" content="#ffffff">
  <script src="/static/vendors/simplebar/simplebar.min.js"></script>
  <script src="/static/assets/js/config.js"></script>

  <link href="/static/vendors/choices/choices.min.css" rel="stylesheet">
  <link href="/static/vendors/flatpickr/flatpickr.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&amp;display=swap"
    rel="stylesheet">
  <link href="/static/vendors/simplebar/simplebar.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
  <link href="/static/assets/css/theme-rtl.min.css" type="text/css" rel="stylesheet" id="style-rtl">
  <link href="/static/assets/css/theme.min.css" type="text/css" rel="stylesheet" id="style-default">
  <link href="/static/assets/css/user-rtl.min.css" type="text/css" rel="stylesheet" id="user-style-rtl">
  <link href="/static/assets/css/user.min.css" type="text/css" rel="stylesheet" id="user-style-default">
  <script>
    var phoenixIsRTL = window.config.config.phoenixIsRTL;
    if (phoenixIsRTL) {
      var linkDefault = document.getElementById('style-default');
      var userLinkDefault = document.getElementById('user-style-default');
      linkDefault.setAttribute('disabled', true);
      userLinkDefault.setAttribute('disabled', true);
      document.querySelector('html').setAttribute('dir', 'rtl');
    } else {
      var linkRTL = document.getElementById('style-rtl');
      var userLinkRTL = document.getElementById('user-style-rtl');
      linkRTL.setAttribute('disabled', true);
      userLinkRTL.setAttribute('disabled', true);
    }
  </script>
</head>

<body>
  <main class="main" id="top">
    {% include 'menu.html' %}
    {% include 'top_bar.html' %}
    <div class="content">

      <div class="pb-6">
        <h2 class="mb-4" id="totalOsCount">{{ context.data.total_items if context.data and context.data.total_items else 0 }} Ordens de Serviço</h2>
        
        <div id="os_table">
          <div class="row g-3 justify-content-between mb-4">
            <div class="col-auto"></div>

            <div class="d-flex flex-column flex-xl-row justify-content-between">
              <div class="mb-3">
                </div>
              <div class="d-flex mb-4 flex-shrink-0">
                <div class="search-box me-2 flex-grow-1" style="min-width: 0;">
                  <form class="position-relative">
                    <input class="form-control search-input search" type="search" id="searchInput"
                      placeholder="Procure por número OS, cliente ou modelo" aria-label="Search" />
                    <span class="fas fa-search search-box-icon"></span>
                  </form>
                </div>
                
                <div class="flatpickr-input-container me-2" style="min-width: 15rem;">
                  <input class="form-control datetimepicker" id="osDateRangePicker" type="text"
                      placeholder="Filtrar por data de emissão" name="daterange"
                      data-options='{"mode":"range","dateFormat":"d/m/y","disableMobile":true}' />
                </div>
                </div>
            </div>

            <div class="table-responsive">
              <table class="table table-sm fs-9 mb-0 overflow-hidden table-hover">
                <thead class="text-body">
                  <tr>
                    <th class="sort border-top" data-sort="numero_os" style="min-width: 8rem;">
                      Número OS
                    </th>
                    <th class="sort border-top" data-sort="nome_cliente" style="min-width: 15rem;">
                      Cliente
                    </th>
                    <th class="sort border-top" data-sort="descricao_produto" style="min-width: 10rem;">
                      Produto
                    </th>
                    <th class="sort border-top" data-sort="descricao_modelo" style="min-width: 12rem;">
                      Modelo
                    </th>
                    <th class="sort border-top text-center" data-sort="data_emissao" style="min-width: 8rem;">
                      Data Emissão
                    </th>
                    <th class="sort border-top" data-sort="consultor_recepcao" style="min-width: 10rem;">
                      Consultor
                    </th>
                    <th class="sort border-top text-center" data-sort="status_os" style="min-width: 6rem;">
                      Status
                    </th>
                  </tr>
                </thead>

                <tbody id="bulk-select-body">
                  <tr>
                    <td colspan="7" class="text-center py-4">
                      <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                      </div>
                      <p class="mt-2 text-muted">Carregando ordens de serviço...</p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div id="paginationContainer" class="row align-items-center justify-content-end py-4 pe-0 fs-9">
              <div class="col-auto d-flex">
                <nav aria-label="pagination">
                  <ul class="pagination mb-0" id="paginationList">
                    </ul>
                </nav>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer position-absolute">
      <div class="row g-0 justify-content-between align-items-center h-100">
        <div class="col-12 col-sm-auto text-center">
          <p class="mb-0 text-body-tertiary text-opacity-85">v1.23.0</p>
        </div>
      </div>
    </footer>
  </main>

  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div id="toastMessage" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body">
          </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="/static/vendors/popper/popper.min.js"></script>
  <script src="/static/vendors/bootstrap/bootstrap.min.js"></script>
  <script src="/static/vendors/anchorjs/anchor.min.js"></script>
  <script src="/static/vendors/is/is.min.js"></script>
  <script src="/static/vendors/fontawesome/all.min.js"></script>
  <script src="/static/vendors/lodash/lodash.min.js"></script>
  <script src="/static/vendors/list.js/list.min.js"></script>
  <script src="/static/vendors/feather-icons/feather.min.js"></script>
  <script src="/static/vendors/dayjs/dayjs.min.js"></script>
  <script src="/static/vendors/choices/choices.min.js"></script>
  <script src="/static/vendors/flatpickr/flatpickr.min.js"></script>
  <script src="/static/assets/js/phoenix.js"></script>
  <script src="/static/vendors/prism/prism.js"></script>
  <script src="/static/assets/js/menu.js"></script>

  <script>
    // Variáveis globais
    let currentPage = 1;
    let currentSearch = '';
    let currentInitialDate = '';
    let currentFinalDate = '';
    let totalPages = 1;
    let totalItems = 0;
    let osList = null; // Para List.js

    // *** ADICIONADO: Função helper para formatar data ***
    function formatDateYYYYMMDD(date) {
      const year = date.getFullYear();
      const month = (date.getMonth() + 1).toString().padStart(2, '0'); // +1 pois getMonth() é base 0
      const day = date.getDate().toString().padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Inicializar feather icons
      if (window.feather) {
        feather.replace();
      }

      // Preencher o campo de busca com o valor da URL
      const urlParams = new URLSearchParams(window.location.search);
      const searchQuery = urlParams.get('search');
      const pageQuery = urlParams.get('current_page');
      const initialDateQuery = urlParams.get('initial_date');
      const finalDateQuery = urlParams.get('final_date');
      
      const searchInput = document.getElementById('searchInput');
      if (searchQuery && searchInput) {
        searchInput.value = searchQuery;
        currentSearch = searchQuery;
      }

      // *** LÓGICA DE DATA MODIFICADA ***
      // Se não houver parâmetros de data na URL, definir o mês atual como padrão
      if (!initialDateQuery || !finalDateQuery) {
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0); // Dia 0 do próximo mês = último dia do mês atual

        currentInitialDate = formatDateYYYYMMDD(firstDay);
        currentFinalDate = formatDateYYYYMMDD(lastDay);
        
        console.log('Datas padrão definidas (mês atual):', currentInitialDate, 'a', currentFinalDate);

        // (Opcional) Atualizar a URL para refletir o padrão (sem recarregar)
        // Isso fará com que o estado padrão seja "sticky" se o usuário recarregar
        const newParams = new URLSearchParams(window.location.search);
        newParams.set('initial_date', currentInitialDate);
        newParams.set('final_date', currentFinalDate);
        if(!pageQuery) newParams.set('current_page', '1');
        const newUrl = window.location.pathname + '?' + newParams.toString();
        // Usar replaceState para não poluir o histórico do navegador
        window.history.replaceState({}, '', newUrl);

      } else {
        // Se houver parâmetros, usar os valores da URL
        currentInitialDate = initialDateQuery;
        currentFinalDate = finalDateQuery;
      }
      // *** FIM DA LÓGICA DE DATA ***


      if (pageQuery) {
        currentPage = parseInt(pageQuery) || 1;
      } else {
        currentPage = 1; // Garantir que a página seja 1 se não estiver na URL
      }

      // Event listeners para busca
      if (searchInput) {
        searchInput.addEventListener('keypress', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            performSearch();
          }
        });
      }

      // Event listener para o ícone de busca
      const searchIcon = document.querySelector('.search-box-icon');
      if (searchIcon) {
        searchIcon.addEventListener('click', function () {
          performSearch();
        });
        searchIcon.style.cursor = 'pointer';
      }

      // Inicializar Flatpickr
      const dateInput = document.getElementById('osDateRangePicker');
      if (dateInput) {
        const fp = flatpickr(dateInput, {
          mode: "range",
          dateFormat: "d/m/y",
          disableMobile: true,
          onChange: function (selectedDates, dateStr, instance) {
            // Ao selecionar um novo range
            if (selectedDates.length === 2) {
              const startDate = flatpickr.formatDate(selectedDates[0], "Y-m-d");
              const endDate = flatpickr.formatDate(selectedDates[1], "Y-m-d");
              if (currentInitialDate !== startDate || currentFinalDate !== endDate) {
                updateUrlAndReload(1, currentSearch, startDate, endDate);
              }
            }
          },
          onClose: function (selectedDates, dateStr, instance) {
            // Ao limpar o campo
            if (selectedDates.length === 0 && instance.input.value === "" && (currentInitialDate || currentFinalDate)) {
              updateUrlAndReload(1, currentSearch, '', '');
            }
          },
          onReady: function (selectedDates, dateStr, instance) {
            // Preencher ao carregar a página
            // Isso agora usará as datas padrão (mês atual) se nenhuma data da URL foi encontrada
            if (currentInitialDate && currentFinalDate) {
              const parseDate = (dateStr) => {
                const parts = dateStr.split('-'); // YYYY-MM-DD
                if (parts.length === 3) {
                  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                }
                return null;
              };
              
              try {
                const startDate = parseDate(currentInitialDate);
                const endDate = parseDate(currentFinalDate);
                if (startDate && endDate && !isNaN(startDate.getTime()) && !isNaN(endDate.getTime())) {
                  instance.setDate([startDate, endDate], false);
                }
              } catch (error) {
                console.error('Error parsing dates:', error);
              }
            }
          }
        });
      }
      // FIM ADICIONADO

      // Carregar dados iniciais (MODIFICADO)
      // A chamada agora usará as datas padrão ou as da URL
      carregarOrdemServico(currentPage, currentSearch, currentInitialDate, currentFinalDate);
    });

    // Função para atualizar URL e recarregar
    function updateUrlAndReload(page, search, initialDate, finalDate) {
      const urlParams = new URLSearchParams(window.location.search);
      
      urlParams.set('current_page', page.toString());

      if (search) { 
        urlParams.set('search', search); 
      } else { 
        urlParams.delete('search'); 
      }
      
      if (initialDate) { 
        urlParams.set('initial_date', initialDate); 
      } else { 
        urlParams.delete('initial_date'); 
      }
      
      if (finalDate) { 
        urlParams.set('final_date', finalDate); 
      } else { 
        urlParams.delete('final_date'); 
      }

      const newUrl = window.location.pathname + '?' + urlParams.toString();
      // Usar pushState aqui para permitir navegação "voltar"
      window.history.pushState({}, '', newUrl);

      // Apenas chama carregarOrdemServico, que já atualiza as variáveis globais
      carregarOrdemServico(page, search, initialDate, finalDate);
    }

    // Função para carregar ordens de serviço (MODIFICADO)
    function carregarOrdemServico(page = 1, search = '', initialDate = '', finalDate = '') {
      console.log('Carregando OS:', { page, search, initialDate, finalDate });
      
      // Atualizar estado global
      currentPage = page;
      currentSearch = search;
      currentInitialDate = initialDate;
      currentFinalDate = finalDate;

      // Mostrar loading
      const tbody = document.getElementById('bulk-select-body');
      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-2 text-muted">Carregando ordens de serviço...</p>
          </td>
        </tr>
      `;

      // Preparar headers da requisição
      const myHeaders = new Headers();
      myHeaders.append("Authorization", "Bearer {{ context.token if context and context.token else 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJlbWFpbCI6InBhYmxvLnRpQGNhaXVhcy5jb20uYnIiLCJuYW1lIjoiUGFibG8gQ2VsZXN0aW5vIiwiZXhwIjoxNzYxNDExNzE1LCJpYXQiOjE3NjEzMjUzMTUsIm5iZiI6MTc2MTMyNTMxNSwiaXNzIjpudWxsfQ.kTgpe_oyejMiHbCZvniSWncHbNwP-pJ6wm-NNw84TEI' }}");

      const requestOptions = {
        method: "GET",
        headers: myHeaders,
        redirect: "follow"
      };

      // Construir URL com parâmetros (MODIFICADO)
      let url = `https://backend.caiuas.com.br/api/oficina/list_os?current_page=${page}`;
      if (search) {
        url += `&search=${encodeURIComponent(search)}`;
      }
      // ADICIONADO
      // Sempre enviar datas, pois agora temos um padrão
      if (initialDate && finalDate) {
        url += `&initial_date=${encodeURIComponent(initialDate)}`;
        url += `&final_date=${encodeURIComponent(finalDate)}`;
      }

      console.log('URL da requisição:', url);

      // Fazer a requisição
      fetch(url, requestOptions)
        .then((response) => {
          console.log('Response status:', response.status);
          if (response.ok) {
            return response.json();
          } else if (response.status === 404) {
            // Tratar 404 como sem resultados
            console.log('404 - Nenhuma OS encontrada');
            return { os: [], current_page: 1, total_pages: 1, total_items: 0 };
          } else {
            return response.text().then(text => {
              console.error('Erro na resposta:', text);
              throw new Error(`Erro ${response.status}: ${text || 'Erro ao carregar ordens de serviço'}`);
            });
          }
        })
        .then((data) => {
          console.log('OS carregadas:', data);
          
          // Atualizar variáveis globais
          totalPages = data.total_pages || 1;
          totalItems = data.total_items || 0;
          
          // Preencher tabela
          preencherTabelaOS(data.os || []);
          
          // Atualizar contador
          atualizarContador();
          
          // Atualizar paginação
          atualizarPaginacao();
          
          // Inicializar List.js se ainda não foi inicializado
          if (!osList && data.os && data.os.length > 0) {
            initializeListJS();
          }
        })
        .catch((error) => {
          console.error('Erro ao carregar OS:', error);
          
          // Mostrar erro
          const tbody = document.getElementById('bulk-select-body');
          tbody.innerHTML = `
            <tr>
              <td colspan="7" class="text-center text-danger py-4">
                <i class="fas fa-exclamation-triangle me-2"></i>
                ${error.message || 'Erro ao carregar ordens de serviço. Tente novamente.'}
              </td>
            </tr>
          `;
          
          // Mostrar toast apenas para erros reais (não 404)
          if (!error.message.includes('404')) {
            showToast(error.message || 'Erro ao carregar ordens de serviço', 'error');
          }
        });
    }

    // Função para preencher tabela de OS
    function preencherTabelaOS(osData) {
      console.log('Preenchendo tabela com OS:', osData);
      
      const tbody = document.getElementById('bulk-select-body');
      
      if (!tbody) {
        console.error('Elemento bulk-select-body não encontrado');
        return;
      }
      
      if (!osData || osData.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center text-muted py-4">
              <i class="fas fa-search me-2"></i>
              ${(currentSearch || currentInitialDate) ? 'Nenhuma ordem de serviço encontrada para o filtro aplicado' : 'Nenhuma ordem de serviço encontrada'}
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = osData.map(os => {
        // Formatear data
        const dataEmissao = os.data_emissao ? new Date(os.data_emissao).toLocaleDateString('pt-BR') : '-';
        
        // Status badge
        const statusBadge = getStatusBadge(os.status_os);
        
        return `
          <tr style="cursor: pointer;" class="os-row" 
              onclick="window.location.href='/veiculos/produtos/${os.cod_modelo}?previous_page=' + encodeURIComponent(window.location.href)"
              data-numero-os="${os.numero_os || ''}"
              data-nome-cliente="${os.nome_cliente || ''}"
              data-descricao-produto="${os.descricao_produto || ''}"
              data-descricao-modelo="${os.descricao_modelo || ''}"
              data-data-emissao="${dataEmissao}"
              data-consultor-recepcao="${os.consultor_recepcao || ''}"
              data-status-os="${os.status_os || ''}">
            
            <td class="numero_os align-middle">
              <span class="fw-semibold text-primary">${os.numero_os || '-'}</span>
            </td>
            
            <td class="nome_cliente align-middle">
              ${os.nome_cliente ? 
                (os.nome_cliente.length > 25 ? 
                  `<span title="${os.nome_cliente}" class="text-body">${os.nome_cliente.substring(0, 22)}...</span>` :
                  `<span class="text-body">${os.nome_cliente}</span>`
                ) : '-'
              }
            </td>
            
            <td class="descricao_produto align-middle">
              ${os.descricao_produto ? 
                (os.descricao_produto.length > 15 ? 
                  `<span title="${os.descricao_produto}" class="text-body">${os.descricao_produto.substring(0, 12)}...</span>` :
                  `<span class="text-body">${os.descricao_produto}</span>`
                ) : '-'
              }
            </td>
            
            <td class="descricao_modelo align-middle">
              ${os.descricao_modelo ? 
                (os.descricao_modelo.length > 20 ? 
                  `<span title="${os.descricao_modelo}" class="text-body">${os.descricao_modelo.substring(0, 17)}...</span>` :
                  `<span class="text-body">${os.descricao_modelo}</span>`
                ) : '-'
              }
            </td>
            
            <td class="data_emissao align-middle text-center">
              <span class="text-body">${dataEmissao}</span>
            </td>
            
            <td class="consultor_recepcao align-middle">
              <span class="text-body">${os.consultor_recepcao || '-'}</span>
            </td>
            
            <td class="status_os align-middle text-center">
              ${statusBadge}
            </td>
          </tr>
        `;
      }).join('');
      
      console.log('Tabela preenchida com', osData.length, 'ordens de serviço');
    }

    // Função para gerar badge do status
    function getStatusBadge(status) {
      switch (status) {
        case 1:
          return '<span class="badge fs-10 badge-phoenix badge-phoenix-primary">Aberta</span>';
        case 2:
          return '<span class="badge fs-10 badge-phoenix badge-phoenix-success">Fechada</span>';
        case 3:
          return '<span class="badge fs-10 badge-phoenix badge-phoenix-danger">Cancelada</span>';
        case 4:
          return '<span class="badge fs-10 badge-phoenix badge-phoenix-danger">Cancelada</span>';
        default:
          return '<span class="badge fs-10 badge-phoenix badge-phoenix-primary">Aberta</span>';
      }
    }

    // Função para atualizar contador
    function atualizarContador() {
      const counterElement = document.getElementById('totalOsCount');
      if (counterElement) {
        counterElement.textContent = `${totalItems} Ordens de Serviço`;
      }
    }

    // Função para atualizar paginação (MODIFICADO)
    function atualizarPaginacao() {
      const paginationList = document.getElementById('paginationList');
      
      if (!paginationList || totalPages <= 1) {
        if (paginationList) paginationList.innerHTML = '';
        return;
      }

      let paginationHTML = '';
      
      // String de parâmetros para os botões
      const params = `'${currentSearch}', '${currentInitialDate}', '${currentFinalDate}'`;

      // Botão anterior
      if (currentPage > 1) {
        paginationHTML += `
          <li class="page-item">
            <button class="page-link" onclick="carregarOrdemServico(${currentPage - 1}, ${params})">
              <i class="fas fa-chevron-left"></i>
            </button>
          </li>
        `;
      } else {
        paginationHTML += `
          <li class="page-item disabled">
            <span class="page-link"><i class="fas fa-chevron-left"></i></span>
          </li>
        `;
      }

      // Páginas numéricas (mostrar até 5 páginas)
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);

      // Primeira página se não estiver visível
      if (startPage > 1) {
        paginationHTML += `
          <li class="page-item">
            <button class="page-link" onclick="carregarOrdemServico(1, ${params})">1</button>
          </li>
        `;
        if (startPage > 2) {
          paginationHTML += `
            <li class="page-item disabled">
              <span class="page-link">...</span>
            </li>
          `;
        }
      }

      // Páginas do range atual
      for (let i = startPage; i <= endPage; i++) {
        if (i === currentPage) {
          paginationHTML += `
            <li class="page-item active">
              <span class="page-link">${i}</span>
            </li>
          `;
        } else {
          paginationHTML += `
            <li class="page-item">
              <button class="page-link" onclick="carregarOrdemServico(${i}, ${params})">${i}</button>
            </li>
          `;
        }
      }

      // Última página se não estiver visível
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          paginationHTML += `
            <li class="page-item disabled">
              <span class="page-link">...</span>
            </li>
          `;
        }
        paginationHTML += `
          <li class="page-item">
            <button class="page-link" onclick="carregarOrdemServico(${totalPages}, ${params})">${totalPages}</button>
          </li>
        `;
      }

      // Botão próximo
      if (currentPage < totalPages) {
        paginationHTML += `
          <li class="page-item">
            <button class="page-link" onclick="carregarOrdemServico(${currentPage + 1}, ${params})">
              <i class="fas fa-chevron-right"></i>
            </button>
          </li>
        `;
      } else {
        paginationHTML += `
          <li class="page-item disabled">
            <span class="page-link"><i class="fas fa-chevron-right"></i></span>
          </li>
        `;
      }

      paginationList.innerHTML = paginationHTML;
    }

    // Função para realizar busca (MODIFICADO)
    function performSearch() {
      const searchInput = document.getElementById('searchInput');
      const query = searchInput ? searchInput.value.trim() : '';
      
      console.log('Executando busca:', query);
      
      // Usar a nova função helper
      updateUrlAndReload(1, query, currentInitialDate, currentFinalDate);
    }

    // Função para inicializar List.js (se necessário para filtros locais)
    function initializeListJS() {
      try {
        osList = new List('os_table', {
          valueNames: ['numero_os', 'nome_cliente', 'descricao_produto', 'descricao_modelo', 'data_emissao', 'consultor_recepcao', 'status_os'],
          page: 100,
          pagination: false // Usar nossa paginação customizada
        });
        
        console.log('List.js inicializado para OS');
        window.osList = osList;
      } catch (error) {
        console.error('Erro ao inicializar List.js:', error);
      }
    }

    // Função para mostrar toast
    function showToast(message, type = 'primary') {
      const toastElement = document.getElementById('toastMessage');
      const toastBody = toastElement.querySelector('.toast-body');

      if (!toastElement || !toastBody) {
        console.error('Toast element não encontrado');
        return;
      }

      // Atualizar a mensagem
      toastBody.textContent = message;

      // Atualizar as classes de cor baseado no tipo
      toastElement.className = `toast align-items-center text-white border-0`;
      if (type === 'success') {
        toastElement.classList.add('bg-success');
      } else if (type === 'error') {
        toastElement.classList.add('bg-danger');
      } else if (type === 'info') {
        toastElement.classList.add('bg-info');
      } else if (type === 'warning') {
        toastElement.classList.add('bg-warning');
      } else {
        toastElement.classList.add('bg-primary');
      }

      // Mostrar o toast
      const toast = new bootstrap.Toast(toastElement, {
        autohide: true,
        delay: 5000
      });
      toast.show();
    }
  </script>
